- route:
    id: rss-world-news
    description: Regularly read the latest 5 news articles from Tuoi Tre and save them to the database.
    from:
      uri: rss
      steps:
        - log:
            message: ">>> Starting RSS cycle"
        - setBody:
            expression:
              groovy: request.body.entries.sort { a, b -> b.publishedDate <=> a.publishedDate }.take(5)
        - split:
            expression:
              simple: ${body}
            steps:
              - setHeader:
                  name: NewsTitle
                  simple: ${body.title}
              - setHeader:
                  name: NewsLink
                  simple: ${body.link}
              - setHeader:
                  name: NewsPubDate
                  simple: ${body.publishedDate}
              - setHeader:
                  name: NewsDesc
                  simple: "${body.description.value} ?: 'No description'"
              - to:
                  id: to-1573
                  uri:
                    sql:INSERT INTO world_news (title, link, pub_date, description, source)
                    VALUES (:#NewsTitle, :#NewsLink, :#NewsPubDate, :#NewsDesc,
                    'Tuoi Tre - World News')?dataSource=#newsWorldDb
              - log:
                  message: "Successfully saved article: ${header.NewsTitle}"
        - log:
            message: ">>> RSS cycle completed"
      id: from-1333
      parameters:
        feedUri: https://tuoitre.vn/rss/the-gioi.rss
        splitEntries: false
        delay: 1800000
        initialDelay: 5000
        repeatCount: 1
