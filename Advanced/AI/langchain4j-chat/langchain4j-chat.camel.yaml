#camel-dashboard:dependency=dev.langchain4j:langchain4j-google-ai-gemini:1.16.1,org.apache.camel:camel-langchain4j-chat:4.20.0
- rest:
    id: rest-chat
    path: /chat
    post:
      - id: post-prompt
        path: /prompt
        to:
          uri: direct:chat-prompt
- route:
    id: chat-prompt-route
    from:
      uri: direct:chat-prompt
      steps:
        - convertBodyTo:
            id: convert-body
            type: java.lang.String
        - to:
            id: to-chat
            uri: langchain4j-chat:gemini-chat
            parameters:
              chatModel: "#myChatModel"
- beans:
    - name: myChatModel
      type: dev.langchain4j.model.googleai.GoogleAiGeminiChatModel
      scriptLanguage: groovy
      script: |
        return dev.langchain4j.model.googleai.GoogleAiGeminiChatModel.builder()
            .apiKey("{{GEMINI_API_KEY}}")
            .modelName("{{GEMINI_MODEL_FLASH_LITE}}")
            .build();
